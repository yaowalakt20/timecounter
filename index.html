document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

pace-between;\">\n      <div style=\"font-size: 22px; font-weight: 900; letter-spacing: -0.3px;\">Exercise Timer<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; background: #EFE6D8; border-radius: 14px; padding: 4px; gap: 4px;\">\n      <sc-for list=\"{{ modes }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ m.pick }}\" style=\"flex: 1; min-height: 44px; border: none; border-radius: 11px; background: {{ m.bg }}; color: {{ m.fg }}; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: {{ m.shadow }};\">{{ m.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; flex-direction: column; align-items: center; gap: 4px;\">\n      <div style=\"position: relative; width: 280px; height: 280px;\">\n        <svg width=\"280\" height=\"280\" viewBox=\"0 0 280 280\">\n          <circle cx=\"140\" cy=\"140\" r=\"118\" fill=\"none\" style=\"stroke: #EDE2D0; stroke-width: {{ ringW }}px;\"><\u002Fcircle>\n          <g transform=\"translate(280 0) scale(-1 1)\">\n            <circle cx=\"140\" cy=\"140\" r=\"118\" fill=\"none\" transform=\"rotate(-90 140 140)\" style=\"stroke: {{ ringColor }}; stroke-width: {{ ringW }}px; stroke-linecap: round; stroke-dasharray: 741.4px; stroke-dashoffset: {{ ringDash }}; transition: stroke 0.3s;\"><\u002Fcircle>\n          <\u002Fg>\n        <\u002Fsvg>\n        <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;\">\n          <div style=\"font-size: 68px; font-weight: 900; line-height: 1; color: {{ numColor }}; font-variant-numeric: tabular-nums; transition: color 0.3s;\">{{ timeText }}<\u002Fdiv>\n          <div style=\"font-size: 15px; font-weight: 800; color: #8A7F6E;\">{{ subLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 20px; font-weight: 900; color: {{ statusColor }};\">{{ statusText }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background: #FFF9F0; border: 2px solid #E8C98F; border-radius: 16px; padding: 14px 16px; text-align: center; animation: popIn 0.45s ease-out;\">\n        <div style=\"font-size: 24px; animation: floaty 2.2s ease-in-out infinite;\">🎉 ✨ 🎊 ✨ 🎉<\u002Fdiv>\n        <div style=\"font-size: 16px; font-weight: 800; margin-top: 4px;\">{{ doneMsg }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isCountdown }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n        <div style=\"display: flex; justify-content: space-between; font-size: 14px; font-weight: 800; color: #8A7F6E;\">\n          <span>Duration<\u002Fspan><span style=\"color: #2A2620;\">{{ durationLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <input type=\"range\" min=\"5\" max=\"300\" step=\"5\" value=\"{{ duration }}\" onchange=\"{{ onSlider }}\" style=\"width: 100%; accent-color: {{ ringColor }}; height: 32px;\">\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n          <sc-for list=\"{{ durChips }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ c.pick }}\" style=\"min-height: 44px; padding: 8px 14px; border-radius: 12px; border: 2px solid {{ c.border }}; background: {{ c.bg }}; color: {{ c.fg }}; font-size: 14px; font-weight: 800; cursor: pointer;\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isInterval }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display: flex; gap: 10px;\">\n        <sc-for list=\"{{ intervalRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <div style=\"flex: 1; background: #F3ECDF; border-radius: 14px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px;\">\n            <div style=\"font-size: 12px; font-weight: 800; color: #8A7F6E; text-transform: uppercase; letter-spacing: 0.5px;\">{{ r.label }}<\u002Fdiv>\n            <div style=\"font-size: 20px; font-weight: 900;\">{{ r.value }}<\u002Fdiv>\n            <div style=\"display: flex; gap: 6px;\">\n              <button onclick=\"{{ r.dec }}\" style=\"width: 44px; height: 44px; border-radius: 10px; border: none; background: #E4D9C6; font-size: 20px; font-weight: 900; cursor: pointer; color: #2A2620;\">−<\u002Fbutton>\n              <button onclick=\"{{ r.inc }}\" style=\"width: 44px; height: 44px; border-radius: 10px; border: none; background: #E4D9C6; font-size: 20px; font-weight: 900; cursor: pointer; color: #2A2620;\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStopwatch }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background: #F3ECDF; border-radius: 14px; padding: 12px 16px; font-size: 14px; font-weight: 700; color: #6E6455; text-align: center;\">Counts up — a voice marks every minute. Great for Zone 2 walks.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"display: flex; gap: 12px;\">\n      <sc-if value=\"{{ showStart }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ start }}\" style=\"flex: 1; min-height: 56px; border: none; border-radius: 16px; background: {{ ringColor }}; color: #FFF; font-size: 19px; font-weight: 900; cursor: pointer; transition: background 0.3s;\">Start<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showPause }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ pause }}\" style=\"flex: 1; min-height: 56px; border: none; border-radius: 16px; background: #2A2620; color: #FFF; font-size: 19px; font-weight: 900; cursor: pointer;\">Pause<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showResume }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ resume }}\" style=\"flex: 1; min-height: 56px; border: none; border-radius: 16px; background: {{ ringColor }}; color: #FFF; font-size: 19px; font-weight: 900; cursor: pointer;\">Resume<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ showReset }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ reset }}\" style=\"flex: 1; min-height: 56px; border: 2px solid #D8CCB8; border-radius: 16px; background: transparent; color: #2A2620; font-size: 19px; font-weight: 900; cursor: pointer;\">Reset<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; align-items: center; gap: 10px;\">\n      <button onclick=\"{{ toggleMute }}\" style=\"min-width: 44px; min-height: 44px; border-radius: 12px; border: 2px solid #D8CCB8; background: {{ muteBg }}; font-size: 20px; cursor: pointer;\">{{ muteIcon }}<\u002Fbutton>\n      <div style=\"flex: 1; display: flex; flex-direction: column; gap: 2px;\">\n        <label style=\"font-size: 12px; font-weight: 800; color: #8A7F6E;\">Sound cues<\u002Flabel>\n        <select value=\"{{ verbosity }}\" onchange=\"{{ setVerbosity }}\" style=\"min-height: 44px; border-radius: 12px; border: 2px solid #D8CCB8; background: #FFF; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; padding: 0 10px; color: #2A2620;\">\n          <option value=\"1\">Beep every second<\u002Foption>\n          <option value=\"2\">Beep every 5s + final 10<\u002Foption>\n          <option value=\"3\">Every minute (voice)<\u002Foption>\n          <option value=\"4\">Milestones only<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 430, &quot;height&quot;: 950}, &quot;voiceRate&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1.05, &quot;min&quot;: 0.7, &quot;max&quot;: 1.5, &quot;step&quot;: 0.05, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Voice&quot;}, &quot;ringThickness&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 16, &quot;min&quot;: 10, &quot;max&quot;: 26, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Timer ring&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.COLOR = '#D97757';\n    this.state = {\n      mode: 'countdown', duration: 90,\n      work: 40, rest: 20, rounds: 8,\n      status: 'idle', elapsedMs: 0,\n      verbosity: '2', muted: false, doneMsg: ''\n    };\n    this.startTs = 0; this.baseMs = 0; this.lastSec = -1; this.lastPhaseKey = ''; this.wl = null;\n  }\n\n  componentDidMount() {\n    this.ticker = setInterval(() => this.tick(), 150);\n    this.loadBeep();\n    this.visHandler = () => {\n      if (document.visibilityState === 'visible' && this.state.status === 'running') this.acquireWake();\n    };\n    document.addEventListener('visibilitychange', this.visHandler);\n  }\n  componentWillUnmount() {\n    clearInterval(this.ticker);\n    document.removeEventListener('visibilitychange', this.visHandler);\n    this.releaseWake();\n  }\n\n  async acquireWake() {\n    try {\n      if ('wakeLock' in navigator) this.wl = await navigator.wakeLock.request('screen');\n    } catch (e) { /* unsupported or denied — timer still runs */ }\n  }\n  releaseWake() {\n    try { if (this.wl) { this.wl.release(); this.wl = null; } } catch (e) {}\n  }\n\n  speak(text, cancelPrev) {\n    if (this.state.muted) return;\n    try {\n      if (!window.speechSynthesis) return;\n      if (cancelPrev) window.speechSynthesis.cancel();\n      const u = new SpeechSynthesisUtterance(text);\n      u.lang = 'en-US';\n      u.rate = this.props.voiceRate ?? 1.05;\n      window.speechSynthesis.speak(u);\n    } catch (e) {}\n  }\n\n  async loadBeep() {\n    try {\n      const res = await fetch((window.__resources && window.__resources.beepWav) || 'uploads/mixkit-simple-countdown-922.wav');\n      const buf = await res.arrayBuffer();\n      this.audioCtx = this.audioCtx || new (window.AudioContext || window.webkitAudioContext)();\n      this.beepBuf = await this.audioCtx.decodeAudioData(buf);\n    } catch (e) { this.beepBuf = null; }\n  }\n  beep() {\n    if (this.state.muted) return;\n    try {\n      if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();\n      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();\n      if (this.beepBuf) {\n        const src = this.audioCtx.createBufferSource();\n        src.buffer = this.beepBuf;\n        src.connect(this.audioCtx.destination);\n        src.start(0, 0, 0.16); // first beep of the attached countdown clip\n      } else {\n        const o = this.audioCtx.createOscillator(), g = this.audioCtx.createGain();\n        o.frequency.value = 880; g.gain.value = 0.15;\n        o.connect(g); g.connect(this.audioCtx.destination);\n        o.start(); o.stop(this.audioCtx.currentTime + 0.12);\n      }\n    } catch (e) {}\n  }\n\n  totalMs() {\n    const s = this.state;\n    if (s.mode === 'countdown') return s.duration * 1000;\n    if (s.mode === 'interval') return (s.rounds * (s.work + s.rest) - s.rest) * 1000;\n    return Infinity;\n  }\n\n  intervalState(ms) {\n    const s = this.state, cyc = (s.work + s.rest) * 1000;\n    const round = Math.min(s.rounds, Math.floor(ms / cyc) + 1);\n    const within = ms - (round - 1) * cyc;\n    const phase = within < s.work * 1000 ? 'work' : 'rest';\n    const phaseLen = (phase === 'work' ? s.work : s.rest) * 1000;\n    const phaseStart = phase === 'work' ? 0 : s.work * 1000;\n    return { round, phase, phaseLen, phaseRemaining: phaseLen - (within - phaseStart) };\n  }\n\n  tick() {\n    if (this.state.status !== 'running') return;\n    const ms = this.baseMs + (Date.now() - this.startTs);\n    const total = this.totalMs();\n    if (ms >= total) { this.complete(); return; }\n    const s = this.state, v = s.verbosity;\n    if (s.mode === 'stopwatch') {\n      const sec = Math.floor(ms / 1000);\n      if (sec !== this.lastSec) {\n        this.lastSec = sec;\n        if (sec > 0 && sec % 60 === 0) {\n          const m = sec / 60;\n          this.speak(m === 1 ? '1 minute' : m + ' minutes', true);\n        }\n      }\n    } else if (s.mode === 'countdown') {\n      const r = Math.ceil((total - ms) / 1000);\n      if (r !== this.lastSec) {\n        this.lastSec = r;\n        this.announceCountdown(r, s.duration, v);\n      }\n    } else {\n      const iv = this.intervalState(ms);\n      const key = iv.round + '-' + iv.phase;\n      if (key !== this.lastPhaseKey) {\n        this.lastPhaseKey = key;\n        if (ms > 400) this.speak(iv.phase === 'work' ? 'Work! Round ' + iv.round : 'Rest', true);\n      }\n      const r = Math.ceil(iv.phaseRemaining / 1000);\n      if (r !== this.lastSec) {\n        this.lastSec = r;\n        if (r > 0 && r < Math.ceil(iv.phaseLen / 1000)) {\n          if (v === '1') this.beep();\n          else if (v === '2' && (r <= 10 || r % 5 === 0)) this.beep();\n        }\n      }\n    }\n    this.setState({ elapsedMs: ms });\n  }\n\n  announceCountdown(r, totalSec, v) {\n    if (r <= 0) return;\n    const half = Math.floor(totalSec / 2);\n    if (r === half && totalSec >= 20) { this.speak('Halfway there', true); return; }\n    if (v === '1') this.beep();\n    else if (v === '2') { if (r <= 10 || r % 5 === 0) this.beep(); }\n    else if (v === '3') { if (r % 60 === 0) this.speak(r === 60 ? '1 minute left' : (r / 60) + ' minutes left', true); }\n    else if (v === '4') { if (r === 10) this.speak('10 seconds left', true); }\n  }\n\n  complete() {\n    const msgs = ['Great job!', 'You crushed it!', 'Nice work — done!', 'Boom. Finished!'];\n    const msg = msgs[Math.floor(Math.random() * msgs.length)];\n    this.releaseWake();\n    this.speak(msg, true);\n    this.setState({ status: 'done', elapsedMs: this.totalMs(), doneMsg: msg });\n  }\n\n  start() {\n    this.baseMs = 0; this.startTs = Date.now(); this.lastSec = -1; this.lastPhaseKey = '';\n    this.acquireWake();\n    try {\n      if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();\n      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();\n      if (!this.beepBuf) this.loadBeep();\n    } catch (e) {}\n    const s = this.state;\n    if (s.mode === 'interval') this.speak('Work! Round 1', true);\n    else this.speak('Go!', true);\n    this.setState({ status: 'running', elapsedMs: 0, doneMsg: '' });\n  }\n  pause() {\n    this.baseMs = this.baseMs + (Date.now() - this.startTs);\n    this.releaseWake();\n    try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {}\n    this.setState({ status: 'paused' });\n  }\n  resume() {\n    this.startTs = Date.now();\n    this.acquireWake();\n    this.setState({ status: 'running' });\n  }\n  reset() {\n    this.baseMs = 0; this.lastSec = -1; this.lastPhaseKey = '';\n    this.releaseWake();\n    try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {}\n    this.setState({ status: 'idle', elapsedMs: 0, doneMsg: '' });\n  }\n\n  fmt(ms) {\n    const sec = Math.max(0, Math.round(ms / 1000));\n    if (sec < 60) return String(sec);\n    const m = Math.floor(sec / 60), s2 = sec % 60;\n    return m + ':' + (s2 < 10 ? '0' : '') + s2;\n  }\n  chipLabel(sec) {\n    if (sec === 120) return '2min';\n    if (sec === 180) return '3min';\n    return sec + 's';\n  }\n\n  renderVals() {\n    const s = this.state, color = this.COLOR;\n    const total = this.totalMs();\n    const ringW = this.props.ringThickness ?? 16;\n    const CIRC = 741.4;\n\n    let frac = 1, timeText = '', subLabel = '', ringColor = color, remainSec = Infinity;\n    if (s.mode === 'countdown') {\n      const remaining = (s.status === 'idle') ? total : Math.max(0, total - s.elapsedMs);\n      frac = total > 0 ? remaining / total : 0;\n      remainSec = Math.ceil(remaining / 1000);\n      timeText = this.fmt(remaining);\n      subLabel = s.status === 'idle' ? s.duration + ' seconds' : 'remaining';\n    } else if (s.mode === 'interval') {\n      if (s.status === 'idle') {\n        frac = 1; timeText = this.fmt(s.work * 1000);\n        subLabel = s.work + 's work / ' + s.rest + 's rest × ' + s.rounds;\n      } else {\n        const iv = this.intervalState(Math.min(s.elapsedMs, total - 1));\n        frac = iv.phaseRemaining / iv.phaseLen;\n        remainSec = Math.ceil(iv.phaseRemaining / 1000);\n        timeText = this.fmt(iv.phaseRemaining);\n        ringColor = iv.phase === 'work' ? color : '#A8B8A0';\n        subLabel = (iv.phase === 'work' ? 'Work' : 'Rest') + ' — Round ' + iv.round + ' of ' + s.rounds;\n      }\n    } else {\n      frac = (s.elapsedMs % 60000) / 60000;\n      timeText = this.fmt(s.elapsedMs);\n      const mins = Math.floor(s.elapsedMs / 60000);\n      subLabel = s.status === 'idle' ? 'counting up' : (mins === 1 ? '1 minute in' : mins + ' minutes in');\n    }\n    if (s.status === 'done') { frac = 0; timeText = s.mode === 'stopwatch' ? timeText : '0'; subLabel = 'complete'; }\n\n    const statusMap = { idle: ['Ready', '#8A7F6E'], running: ['Going 💪', color], paused: ['Paused ☁️', '#8A7F6E'], done: ['Done 🎉', '#C77B30'] };\n    const numColor = (s.status === 'running' && remainSec <= 10 && s.mode !== 'stopwatch') ? '#C1442E' : '#2A2620';\n\n    const modes = [['countdown', 'Countdown'], ['interval', 'Interval'], ['stopwatch', 'Stopwatch']].map(([id, label]) => {\n      const sel = id === s.mode;\n      return { label, bg: sel ? '#FFFFFF' : 'transparent', fg: sel ? '#2A2620' : '#8A7F6E',\n        shadow: sel ? '0 1px 4px rgba(42,38,32,0.15)' : 'none',\n        pick: () => { this.baseMs = 0; this.lastSec = -1; this.lastPhaseKey = ''; this.releaseWake(); this.setState({ mode: id, status: 'idle', elapsedMs: 0, doneMsg: '' }); } };\n    });\n\n    const chipSecs = [10, 30, 60, 90, 120, 180];\n    const durChips = chipSecs.map(sec => {\n      const sel = sec === s.duration;\n      return { label: this.chipLabel(sec),\n        bg: sel ? color : '#FFFFFF', fg: sel ? '#FFFFFF' : '#2A2620', border: sel ? color : '#E4D9C6',\n        pick: () => { this.baseMs = 0; this.setState({ duration: sec, status: 'idle', elapsedMs: 0, doneMsg: '' }); } };\n    });\n\n    const stepper = (key, min, max, step, unit) => ({\n      label: key === 'work' ? 'Work' : key === 'rest' ? 'Rest' : 'Rounds',\n      value: unit ? s[key] + unit : String(s[key]),\n      dec: () => this.setState({ [key]: Math.max(min, s[key] - step), status: 'idle', elapsedMs: 0, doneMsg: '' }),\n      inc: () => this.setState({ [key]: Math.min(max, s[key] + step), status: 'idle', elapsedMs: 0, doneMsg: '' })\n    });\n\n    return {\n      modes, durChips,\n      intervalRows: [stepper('work', 5, 300, 5, 's'), stepper('rest', 5, 180, 5, 's'), stepper('rounds', 1, 30, 1, '')],\n      isCountdown: s.mode === 'countdown', isInterval: s.mode === 'interval', isStopwatch: s.mode === 'stopwatch',\n      isDone: s.status === 'done', doneMsg: s.doneMsg,\n      showStart: s.status === 'idle' || s.status === 'done',\n      showPause: s.status === 'running',\n      showResume: s.status === 'paused',\n      showReset: s.status !== 'idle',\n      statusText: statusMap[s.status][0], statusColor: statusMap[s.status][1],\n      timeText, subLabel, numColor, ringColor, ringW,\n      ringDash: (CIRC * (1 - Math.max(0, Math.min(1, frac)))).toFixed(1) + 'px',\n      duration: s.duration, durationLabel: this.fmt(s.duration * 1000) + (s.duration < 60 ? 's' : ''),\n      onSlider: (e) => { this.baseMs = 0; this.setState({ duration: +e.target.value, status: 'idle', elapsedMs: 0, doneMsg: '' }); },\n      verbosity: s.verbosity,\n      setVerbosity: (e) => this.setState({ verbosity: e.target.value }),\n      muteIcon: s.muted ? '🔇' : '🔊',\n      muteBg: s.muted ? '#E4D9C6' : '#FFFFFF',\n      toggleMute: () => {\n        const m = !s.muted;\n        if (m) { try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {} }\n        this.setState({ muted: m });\n      },\n      start: () => this.start(), pause: () => this.pause(), resume: () => this.resume(), reset: () => this.reset()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
